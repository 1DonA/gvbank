<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Navy backdrop -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Gold chip mark -->
  <rect x="36" y="36" width="108" height="108" rx="20" fill="url(#chip)"/>
  <!-- Serif G -->
  <text x="90" y="120" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
        font-weight="700" font-size="88"
        fill="#0a1628" letter-spacing="-2">G</text>
  <!-- Fine gold hairline -->
  <rect x="42" y="42" width="96" height="96" rx="16" fill="none"
        stroke="#f0d78a" stroke-opacity="0.35" stroke-width="1"/>
</svg>
